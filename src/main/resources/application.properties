spring.application.name=hod-permission-system
server.port=${PORT:8080}

# Database Configuration - Using H2 for development (no external MySQL needed)
# Comment out MySQL config and uncomment H2 config for easy development
# spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:hod_system}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
# spring.datasource.username=${MYSQLUSER:root}
# spring.datasource.password=${MYSQLPASSWORD:}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Database for Development (uncomment these lines for easy setup)
spring.datasource.url=jdbc:h2:mem:hod_system;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (for debugging - access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never

file.upload-dir=uploads
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true
spring.mail.default-encoding=UTF-8
