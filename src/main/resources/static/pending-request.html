<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pending Requests</title>
    <link rel="stylesheet" href="css/pending-request.css" />
</head>
<body>
    <div class="page-wrap">
        <section class="content-card">
            <div class="card-header">
                <div>
                    <h2>Pending Requests</h2>
                    <p>Review and approve or reject student requests.</p>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Reason / Event</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Request Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/pending-request.js"></script>
</body>
</html>
