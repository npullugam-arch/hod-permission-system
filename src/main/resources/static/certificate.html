<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Certificate</title>
    <link rel="stylesheet" href="css/certificate.css" />
</head>
<body>
    <div class="page-wrap">
        <section class="content-card">
            <div class="card-header">
                <h2>Upload Certificate</h2>
                <p>Upload certificate for approved requests. Allowed types: JPG, JPEG, PNG, PDF. Max size: 1 MB.</p>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Event / Reason</th>
                            <th>HOD</th>
                            <th>End Date</th>
                            <th>Certificate Due</th>
                            <th>Certificate Path</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="certificateTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/certificate.js"></script>
</body>
</html>
