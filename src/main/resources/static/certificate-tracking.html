<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate Tracking</title>
    <link rel="stylesheet" href="css/certificate-tracking.css" />
</head>
<body>
    <div class="page-wrap">
        <section class="content-card">
            <div class="card-header">
                <div>
                    <h2>Certificate Tracking</h2>
                    <p>Track certificate submission status for approved requests and view uploaded certificates.</p>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Event Name</th>
                            <th>Event End</th>
                            <th>Deadline</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="trackingTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/certificate-tracking.js"></script>
</body>
</html>
