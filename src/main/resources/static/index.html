<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Login - HOD System</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>
    <main class="page">
        <!-- LEFT PANEL -->
        <section class="left-panel">
            <div class="brand">
                <img
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoY5aUaumXwk8JzmsSTFe-DpjZNMMY7pF31Q&s"
                    alt="Institution Logo"
                    class="brand-image"
                />
            </div>

            <div class="hero">
                <img
                    src="https://i.postimg.cc/vB9nm9tV/sanchara-logo-clean.png"
                    alt="Portal Logo"
                    class="sanchari-logo"
                    style="width: 220px; max-width: 100%; margin-bottom: 18px;"
                />

                <p>
                    Enhancing institutional efficiency through a structured and reliable system
                    for managing student permissions with the Head of Department.
                </p>

                <div class="hero-points">
                    <div class="hero-pill">Structured approval workflow</div>
                    <div class="hero-pill">Role-based institutional access</div>
                    <div class="hero-pill">Professional and reliable interface</div>
                </div>
            </div>
        </section>

        <!-- RIGHT PANEL -->
        <section class="right-panel">
            <!-- Mobile Logo -->
            <div class="mobile-logo">
                <img
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoY5aUaumXwk8JzmsSTFe-DpjZNMMY7pF31Q&s"
                    alt="Institution Logo"
                    class="mobile-brand-image"
                />
            </div>

            <div class="login-wrapper">
                <!-- Animated SVG characters -->
                <div class="characters-container top-characters">
                    <svg id="character-svg-top" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
                        <g class="character" transform="translate(180, 160) scale(1.6)">
                            <rect x="-40" y="-30" width="80" height="120" rx="40" fill="#a2d2ff" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>

                        <g class="character" transform="translate(620, 150) scale(1.5)">
                            <rect x="-40" y="-30" width="80" height="120" rx="40" fill="#ffafcc" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>

                        <g class="character" transform="translate(400, 190) scale(1.1)">
                            <rect x="-40" y="-30" width="80" height="100" rx="40" fill="#fdf0d5" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>

                        <g class="character" transform="translate(300, 220) scale(0.7)">
                            <rect x="-40" y="-30" width="80" height="90" rx="40" fill="#caffbf" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>

                        <g class="character" transform="translate(500, 210) scale(0.65)">
                            <rect x="-40" y="-30" width="80" height="90" rx="40" fill="#cdb4db" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>

                        <g class="character" transform="translate(360, 240) scale(0.4)">
                            <rect x="-40" y="-30" width="80" height="90" rx="40" fill="#ffc8dd" class="body" />
                            <g class="eyes">
                                <circle cx="-15" cy="-10" r="12" fill="white" />
                                <circle cx="-15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                                <circle cx="15" cy="-10" r="12" fill="white" />
                                <circle cx="15" cy="-10" r="5" fill="#2b2d42" class="pupil" />
                            </g>
                            <path d="M -10 10 Q 0 15 10 10" stroke="#2b2d42" stroke-width="3" fill="none" stroke-linecap="round" class="mouth" />
                        </g>
                    </svg>
                </div>

                <!-- Login Card -->
                <div class="login-container">
                    <div class="form-card" id="loginCard">
                        <h2>Student / HOD Login</h2>

                        <div class="role-toggle" id="roleToggle">
                            <button type="button" class="toggle-btn active" data-role="STUDENT">Student</button>
                            <button type="button" class="toggle-btn" data-role="HOD">HOD</button>
                        </div>

                        <form id="loginForm">
                            <div class="input-group">
                                <label for="username">Username</label>
                                <input
                                    type="text"
                                    id="username"
                                    placeholder="Enter username"
                                    autocomplete="off"
                                    required
                                />
                            </div>

                            <div class="input-group">
                                <label for="password">Password</label>
                                <input
                                    type="password"
                                    id="password"
                                    placeholder="Enter password"
                                    autocomplete="off"
                                    required
                                />
                            </div>

                            <button type="submit" id="loginBtn">
                                <span class="btn-text">Sign In</span>
                                <span class="btn-arrow">→</span>
                            </button>
                        </form>

                        <div id="statusBox" class="status-box"></div>
                        <div class="portal-note" id="portalNote">Selected Portal: Student</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
